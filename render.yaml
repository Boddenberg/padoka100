services:
  - type: web
    name: padoka100-api
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: APP_NAME
        value: Padoka 100 API
      - key: APP_ENV
        value: production
      - key: API_PREFIX
        value: /api/v1
      - key: CORS_ORIGINS
        sync: false
      - key: API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: padoka-midia
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TEXT_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_TRANSCRIPTION_MODEL
        value: gpt-4o-transcribe
